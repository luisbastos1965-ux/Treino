<!-- ========================= -->
<!-- SUBSTITUI TODA A SECÇÃO -->
<!-- VIEW EVOLUÇÃO -->
<!-- ========================= -->

<div id="view-evolucao" class="view-section">

    <h2>📈 Progresso</h2>

    <select id="exercise-select"
    class="chart-select"
    onchange="renderChart()">

        <option value="">
            Escolhe um exercício...
        </option>

    </select>

    <canvas id="progressChart"></canvas>

    <!-- PRs -->
    <div id="pr-display"
    class="goal-container">

        <h3>🏆 PRs</h3>

        <p style="
        margin-top:10px;
        color:var(--text-muted);
        ">
        Seleciona um exercício para veres os recordes.
        </p>

    </div>

    <!-- ESTATÍSTICAS -->
    <div id="global-stats"
    class="goal-container">

        <h3>📊 Estatísticas Globais</h3>

        <p style="
        margin-top:10px;
        color:var(--text-muted);
        ">
        Ainda sem dados suficientes.
        </p>

    </div>

    <!-- COACH -->
    <div id="coach-box"
    class="goal-container">

        <h3>🧠 Coach</h3>

        <p id="coach-message"
        style="
        margin-top:10px;
        line-height:1.6;
        color:var(--text-muted);
        ">

        Seleciona um exercício para veres a análise do coach.

        </p>

    </div>

</div>


<!-- ========================= -->
<!-- SUBSTITUI A FUNÇÃO -->
<!-- renderChart() -->
<!-- ========================= -->

<script>

function renderChart(){

    const exercise =
    document.getElementById("exercise-select").value;

    /* ========================= */
    /* CASO NÃO HAJA EXERCÍCIO */
    /* ========================= */

    if(!exercise){

        document.getElementById("coach-message")
        .innerText =
        "Seleciona um exercício para veres a análise do coach.";

        document.getElementById("pr-display")
        .innerHTML = `

            <h3>🏆 PRs</h3>

            <p style="
            margin-top:10px;
            color:var(--text-muted);
            ">
            Seleciona um exercício para veres os recordes.
            </p>

        `;

        return;
    }

    const labels = [];
    const dataPoints = [];
    const repsData = [];

    history.forEach(log=>{

        if(log.exercises[exercise]){

            labels.push(log.date);

            dataPoints.push(
                log.exercises[exercise][0].weight
            );

            repsData.push(
                log.exercises[exercise][0].reps
            );
        }
    });

    /* ========================= */
    /* LIMPA GRÁFICO ANTIGO */
    /* ========================= */

    if(chartInstance){
        chartInstance.destroy();
    }

    /* ========================= */
    /* CRIA NOVO GRÁFICO */
    /* ========================= */

    const ctx =
    document.getElementById("progressChart")
    .getContext("2d");

    chartInstance = new Chart(ctx,{

        type:"line",

        data:{

            labels:labels,

            datasets:[{

                label:"Carga (kg)",

                data:dataPoints,

                borderColor:"#38bdf8",

                backgroundColor:
                "rgba(56,189,248,0.2)",

                borderWidth:3,

                tension:0.3,

                fill:true
            }]
        },

        options:{

            responsive:true,

            plugins:{
                legend:{
                    labels:{
                        color:"white"
                    }
                }
            },

            scales:{
                x:{
                    ticks:{
                        color:"#94a3b8"
                    }
                },

                y:{
                    ticks:{
                        color:"#94a3b8"
                    }
                }
            }
        }
    });

    /* ========================= */
    /* PRs */
    /* ========================= */

    const maxWeight =
    Math.max(...dataPoints);

    const maxReps =
    Math.max(...repsData);

    const estimated1RM =
    Math.round(
        maxWeight *
        (1 + maxReps / 30)
    );

    let totalVolume = 0;

    history.forEach(log=>{

        if(log.exercises[exercise]){

            log.exercises[exercise]
            .forEach(set=>{

                totalVolume +=
                set.weight * set.reps;

            });
        }
    });

    document.getElementById("pr-display")
    .innerHTML = `

        <h3>🏆 PRs</h3>

        <br>

        <p>
        <strong>Maior carga:</strong>
        ${maxWeight} kg
        </p>

        <p>
        <strong>Maior número de reps:</strong>
        ${maxReps}
        </p>

        <p>
        <strong>1RM estimado:</strong>
        ${estimated1RM} kg
        </p>

        <p>
        <strong>Volume acumulado:</strong>
        ${Math.round(totalVolume)} kg
        </p>

    `;

    /* ========================= */
    /* COACH */
    /* ========================= */

    let coachMessage = "";

    if(dataPoints.length >= 3){

        const last =
        dataPoints[dataPoints.length-1];

        const previous =
        dataPoints[dataPoints.length-2];

        const older =
        dataPoints[dataPoints.length-3];

        if(
            last <= previous &&
            previous <= older
        ){

            coachMessage =
            `⚠️ Estás sem progressão recente no exercício "${exercise}". 
            Considera aumentar descanso, rever fadiga ou ajustar volume semanal.`;

        }else if(last > previous){

            coachMessage =
            `📈 Excelente evolução no "${exercise}". 
            Estás a aplicar sobrecarga progressiva corretamente.`;

        }else{

            coachMessage =
            `💡 Mantém consistência no "${exercise}". 
            Pequenas melhorias acumuladas geram grandes resultados.`;
        }

    }else{

        coachMessage =
        `📊 Ainda existem poucos dados para uma análise avançada do "${exercise}".`;
    }

    document.getElementById("coach-message")
    .innerText = coachMessage;

    /* ========================= */
    /* GLOBAL STATS */
    /* ========================= */

    updateGlobalStats();
}


/* ========================= */
/* GLOBAL STATS */
/* ========================= */

function updateGlobalStats(){

    let totalWorkouts =
    history.length;

    let totalSets = 0;

    let totalVolume = 0;

    let exercisesDone = {};

    history.forEach(log=>{

        Object.entries(log.exercises)
        .forEach(([exercise,sets])=>{

            if(!exercisesDone[exercise]){
                exercisesDone[exercise]=0;
            }

            exercisesDone[exercise]++;

            totalSets += sets.length;

            sets.forEach(set=>{

                totalVolume +=
                set.weight * set.reps;

            });
        });
    });

    let favoriteExercise =
    Object.keys(exercisesDone)
    .reduce((a,b)=>

        exercisesDone[a] >
        exercisesDone[b]

        ? a
        : b

    ,"Nenhum");

    /* STREAK */

    let streak = 0;

    const sortedDates =

    [...new Set(history.map(h=>h.date))]

    .sort((a,b)=>

        new Date(b)-new Date(a)

    );

    if(sortedDates.length){

        streak = 1;

        for(let i=1;i<sortedDates.length;i++){

            const current =
            new Date(sortedDates[i-1]);

            const previous =
            new Date(sortedDates[i]);

            const diff =

            (current - previous)

            /(1000*60*60*24);

            if(diff <= 1){

                streak++;

            }else{

                break;
            }
        }
    }

    document.getElementById("global-stats")
    .innerHTML = `

        <h3>📊 Estatísticas Globais</h3>

        <br>

        <p>
        <strong>Total de treinos:</strong>
        ${totalWorkouts}
        </p>

        <p>
        <strong>Total de séries:</strong>
        ${totalSets}
        </p>

        <p>
        <strong>Volume total:</strong>
        ${Math.round(totalVolume)} kg
        </p>

        <p>
        <strong>Exercício favorito:</strong>
        ${favoriteExercise}
        </p>

        <p>
        <strong>Streak atual:</strong>
        ${streak} dias
        </p>

    `;
}

</script>
