<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg-color:#0f172a;
    --card-bg:#1e293b;
    --accent:#38bdf8;
    --text:#f8fafc;
    --muted:#94a3b8;
    --success:#22c55e;
    --danger:#ef4444;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    background:var(--bg-color);
    color:var(--text);
    padding:15px;
    padding-bottom:110px;
}

.main-nav{
    display:flex;
    gap:10px;
    background:#000;
    padding:5px;
    border-radius:12px;
    margin-bottom:20px;
}

.main-nav button,
.tab-btn{
    flex:1;
    border:none;
    padding:12px;
    border-radius:10px;
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    font-weight:bold;
}

.main-nav button.active,
.tab-btn.active{
    background:var(--card-bg);
    color:var(--text);
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.view-section{
    display:none;
}

.view-section.active{
    display:block;
}

.exercise-card{
    background:var(--card-bg);
    padding:15px;
    border-radius:16px;
    margin-bottom:15px;
}

.exercise-name{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.history-badge{
    background:#334155;
    color:var(--accent);
    padding:6px 10px;
    border-radius:8px;
    display:inline-block;
    margin-bottom:12px;
    font-size:12px;
}

.exercise-buttons{
    display:flex;
    gap:8px;
    margin-bottom:12px;
}

.exercise-tip-btn,
.exercise-video-btn{
    flex:1;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.exercise-tip-btn{
    background:#334155;
    color:white;
}

.exercise-video-btn{
    background:var(--accent);
    color:black;
}

.set-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    background:#334155;
    padding:8px;
    border-radius:10px;
    margin-bottom:8px;
}

.set-row.done{
    border-left:4px solid var(--success);
    opacity:0.7;
}

.input-group{
    display:flex;
    align-items:center;
    gap:4px;
}

.input-group input,
.input-group select{
    width:60px;
    border:none;
    border-radius:6px;
    padding:8px;
    background:var(--bg-color);
    color:white;
    text-align:center;
}

.input-group label{
    font-size:11px;
    color:var(--muted);
}

.check-btn{
    border:none;
    background:var(--success);
    color:white;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.footer-action{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:var(--bg-color);
    display:flex;
    gap:10px;
    padding:15px;
}

.btn-primary,
.btn-secondary{
    border:none;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.btn-primary{
    flex:2;
    background:var(--success);
    color:white;
}

.btn-secondary{
    flex:1;
    background:#334155;
    color:white;
}

.goal-container{
    background:var(--card-bg);
    padding:15px;
    border-radius:16px;
    margin-top:20px;
}

.progress-bar{
    height:10px;
    background:#334155;
    border-radius:6px;
    overflow:hidden;
    margin-top:10px;
}

.progress-fill{
    height:100%;
    width:0%;
    background:var(--accent);
}

.calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.calendar-header button{
    border:none;
    background:var(--card-bg);
    color:white;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
}

.weekdays,
.calendar-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
}

.weekdays{
    margin-bottom:8px;
    color:var(--muted);
    text-align:center;
}

.day-box{
    min-height:60px;
    background:#334155;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.day-box.trained{
    background:var(--success);
    font-weight:bold;
}

.day-box.empty{
    background:transparent;
}

canvas{
    background:var(--card-bg);
    padding:10px;
    border-radius:16px;
    margin-top:20px;
}

.chart-select{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--card-bg);
    color:white;
}

#timer-banner{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:var(--accent);
    color:black;
    text-align:center;
    padding:10px;
    font-weight:bold;
    display:none;
    z-index:999;
}
</style>
</head>

<body>

<div id="timer-banner">
⏳ Descanso: <span id="timer-display">90</span>s
</div>

<div class="main-nav">
    <button class="active" onclick="switchMainView(event,'view-treino')">Treinar</button>
    <button onclick="switchMainView(event,'view-evolucao')">Progresso</button>
    <button onclick="switchMainView(event,'view-calendario')">Calendário</button>
</div>

<div id="view-treino" class="view-section active">

    <div class="tabs">
        <button class="tab-btn active" onclick="switchWorkout(event,'PUSH')">PUSH</button>
        <button class="tab-btn" onclick="switchWorkout(event,'PULL')">PULL</button>
        <button class="tab-btn" onclick="switchWorkout(event,'LEGS')">LEGS</button>
    </div>

    <div id="workout-container"></div>

    <div class="footer-action">
        <button class="btn-secondary" onclick="shareWorkout()">Partilhar</button>
        <button class="btn-primary" onclick="saveCurrentWorkout()">Gravar Treino</button>
    </div>
</div>

<div id="view-evolucao" class="view-section">

    <h2>📈 Progresso</h2>

    <select id="exercise-select" class="chart-select" onchange="renderChart()">
        <option value="">Escolhe um exercício...</option>
    </select>

    <canvas id="progressChart"></canvas>

    <div id="pr-display" class="goal-container">
        <h3>🏆 PRs</h3>
        <p style="margin-top:10px;color:var(--muted);">
        Seleciona um exercício.
        </p>
    </div>

    <div id="global-stats" class="goal-container">
        <h3>📊 Estatísticas Globais</h3>
    </div>

    <div id="coach-box" class="goal-container">
        <h3>🧠 Coach</h3>
        <p id="coach-message"
        style="margin-top:10px;color:var(--muted);line-height:1.6;">
        Seleciona um exercício para veres a análise.
        </p>
    </div>

</div>

<div id="view-calendario" class="view-section">

    <div class="calendar-header">
        <button onclick="changeMonth(-1)">◀</button>
        <h2 id="calendar-title"></h2>
        <button onclick="changeMonth(1)">▶</button>
    </div>

    <div class="weekdays">
        <div>Seg</div>
        <div>Ter</div>
        <div>Qua</div>
        <div>Qui</div>
        <div>Sex</div>
        <div>Sáb</div>
        <div>Dom</div>
    </div>

    <div class="goal-container">
        <h3>🎯 Meta Semanal: 6 Treinos</h3>
        <p style="margin-top:10px;color:var(--muted);">
        <span id="weekly-count">0</span>/6
        </p>

        <div class="progress-bar">
            <div class="progress-fill" id="weekly-progress"></div>
        </div>
    </div>

    <div class="goal-container">
        <h3>📅 Meta Mensal: 24 Treinos</h3>
        <p style="margin-top:10px;color:var(--muted);">
        <span id="monthly-count">0</span>/24
        </p>

        <div class="progress-bar">
            <div class="progress-fill" id="monthly-progress"></div>
        </div>
    </div>

    <div class="calendar-grid" id="calendar-grid"></div>

</div>

<div id="exercise-modal"
style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;padding:20px;z-index:9999;">

    <div style="background:var(--card-bg);padding:20px;border-radius:16px;max-width:500px;width:100%;position:relative;">

        <button onclick="closeModal()"
        style="position:absolute;top:10px;right:10px;background:none;border:none;color:white;font-size:20px;cursor:pointer;">
        ✖
        </button>

        <h2 id="modal-title" style="margin-bottom:15px;"></h2>

        <p id="modal-content"
        style="line-height:1.6;color:var(--muted);"></p>

    </div>

</div>

<script>

const workoutData={

PUSH:[
{name:'Supino Inclinado c/ Halteres',sets:3},
{name:'Supino Plano na Máquina',sets:3},
{name:'Press Militar c/ Halteres',sets:3},
{name:'Elevações Laterais na Polia',sets:4},
{name:'Tríceps à Testa',sets:3},
{name:'Tríceps na Polia',sets:3}
],

PULL:[
{name:'Puxada Vertical na Polia Alta',sets:3},
{name:'Remada Sentada com Cabo',sets:3},
{name:'Remada Inclinada c/ Halteres',sets:3},
{name:'Voos Posteriores',sets:4},
{name:'Curl de Bíceps Inclinado',sets:3},
{name:'Curl Martelo',sets:3}
],

LEGS:[
{name:'Leg Press / Hack',sets:4},
{name:'Peso Morto Romeno (RDL)',sets:3},
{name:'Extensão de Pernas',sets:3},
{name:'Flexão de Pernas',sets:3},
{name:'Elevação de Gémeos em Pé',sets:4}
]
};

let currentDay='PUSH';
let history=JSON.parse(localStorage.getItem('gym_history'))||[];
let currentCalendarDate=new Date();
let chartInstance;
let timerInterval;

function switchMainView(event,id){

    document.querySelectorAll('.view-section')
    .forEach(v=>v.classList.remove('active'));

    document.getElementById(id)
    .classList.add('active');

    document.querySelectorAll('.main-nav button')
    .forEach(btn=>btn.classList.remove('active'));

    event.target.classList.add('active');

    if(id==='view-evolucao'){
        setupChartSelect();
        updateGlobalStats();
    }

    if(id==='view-calendario'){
        renderCalendar();
    }
}

function switchWorkout(event,day){

    currentDay=day;

    document.querySelectorAll('.tab-btn')
    .forEach(btn=>btn.classList.remove('active'));

    event.target.classList.add('active');

    renderWorkout();
}

function getLastPerformance(exerciseName){

    for(let i=history.length-1;i>=0;i--){

        if(history[i].exercises[exerciseName]){
            return history[i].exercises[exerciseName];
        }
    }

    return null;
}

function renderWorkout(){

const container=document.getElementById('workout-container');
container.innerHTML='';

workoutData[currentDay].forEach((ex,exIdx)=>{

const lastPerf=getLastPerformance(ex.name);

const historyHTML=lastPerf
?
`<div class="history-badge">
Última vez: ${lastPerf[0].weight}kg x ${lastPerf[0].reps} (RIR: ${lastPerf[0].rir !== undefined ? lastPerf[0].rir : '-'})
</div>`
:
``;

let setsHTML='';

for(let s=1;s<=ex.sets;s++){

const pW=lastPerf&&lastPerf[s-1]?lastPerf[s-1].weight:'';
const pR=lastPerf&&lastPerf[s-1]?lastPerf[s-1].reps:'';

setsHTML+=`
<div class="set-row" id="row-${exIdx}-${s}">

<span>S${s}</span>

<div class="input-group">
<label>KG</label>
<input type="number" id="weight-${exIdx}-${s}" placeholder="${pW}">
</div>

<div class="input-group">
<label>REPS</label>
<input type="number" id="reps-${exIdx}-${s}" placeholder="${pR}">
</div>

<div class="input-group">
<label>RIR</label>
<select id="rir-${exIdx}-${s}">
<option value="0">0</option>
<option value="1" selected>1</option>
<option value="2">2</option>
<option value="3">3+</option>
</select>
</div>

<button class="check-btn"
onclick="checkSet(${exIdx},${s})">
✔
</button>

</div>
`;
}

container.innerHTML+=`
<div class="exercise-card">

<div class="exercise-name">${ex.name}</div>

${historyHTML}

<div class="exercise-buttons">

<button class="exercise-tip-btn"
onclick="showExerciseTips('${ex.name}')">
📘 Dicas
</button>

<button class="exercise-video-btn"
onclick="showExerciseVideo('${ex.name}')">
🎥 Vídeo
</button>

</div>

${setsHTML}

</div>
`;
});
}

function checkSet(exIdx,s){

    document.getElementById(`row-${exIdx}-${s}`)
    .classList.add('done');

    startTimer(90);
}

function startTimer(seconds){

clearInterval(timerInterval);

const banner=document.getElementById('timer-banner');
const display=document.getElementById('timer-display');

banner.style.display='block';

let timeLeft=seconds;
display.innerText=timeLeft;

timerInterval=setInterval(()=>{

    timeLeft--;
    display.innerText=timeLeft;

    if(timeLeft<=0){

        clearInterval(timerInterval);
        banner.style.display='none';

        alert('Descanso terminado!');
    }

},1000);
}

function saveCurrentWorkout(){

const dateObj=new Date();

const todayString=
`${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;

const workoutLog={
date:todayString,
day:currentDay,
exercises:{}
};

const cards=document.querySelectorAll('.exercise-card');

cards.forEach((card,exIdx)=>{

const exName=workoutData[currentDay][exIdx].name;
const sets=[];

for(let s=1;s<=workoutData[currentDay][exIdx].sets;s++){

const weight=parseFloat(document.getElementById(`weight-${exIdx}-${s}`).value||document.getElementById(`weight-${exIdx}-${s}`).placeholder||0);
const reps=parseInt(document.getElementById(`reps-${exIdx}-${s}`).value||document.getElementById(`reps-${exIdx}-${s}`).placeholder||0);
const rir=parseInt(document.getElementById(`rir-${exIdx}-${s}`).value||0);

sets.push({weight,reps,rir});
}

workoutLog.exercises[exName]=sets;
});

history.push(workoutLog);
localStorage.setItem('gym_history',JSON.stringify(history));

alert('Treino gravado!');
}

function setupChartSelect(){

const select=document.getElementById('exercise-select');

select.innerHTML='<option value="">Escolhe um exercício...</option>';

const uniqueExercises=new Set();

history.forEach(log=>{

Object.keys(log.exercises)
.forEach(ex=>uniqueExercises.add(ex));

});

uniqueExercises.forEach(ex=>{

select.innerHTML+=`<option value="${ex}">${ex}</option>`;

});
}

function renderChart(){

const exercise=document.getElementById('exercise-select').value;

if(!exercise)return;

const labels=[];
const data=[];
const reps=[];

history.forEach(log=>{

if(log.exercises[exercise]){

labels.push(log.date);

data.push(log.exercises[exercise][0].weight);

reps.push(log.exercises[exercise][0].reps);
}
});

if(chartInstance){
chartInstance.destroy();
}

const ctx=document.getElementById('progressChart').getContext('2d');

chartInstance=new Chart(ctx,{

type:'line',

data:{
labels,
datasets:[{
label:'Carga (kg)',
data,
borderColor:'#38bdf8',
backgroundColor:'rgba(56,189,248,0.2)',
fill:true,
tension:0.3
}]
}
});

const maxWeight=Math.max(...data);
const maxReps=Math.max(...reps);
const estimated1RM=Math.round(maxWeight*(1+maxReps/30));

let totalVolume=0;

history.forEach(log=>{

if(log.exercises[exercise]){

log.exercises[exercise].forEach(set=>{

    totalVolume+=set.weight*set.reps;

});
}
});

let coach='';

if(data.length>=3){

const last=data[data.length-1];
const previous=data[data.length-2];

if(last>previous){
coach='📈 Excelente progressão recente.';
}else{
coach='⚠️ Sem progressão recente. Considera ajustar volume ou recuperação.';
}

}else{
coach='📊 Ainda há poucos dados para análise.';
}

document.getElementById('coach-message').innerText=coach;

document.getElementById('pr-display').innerHTML=`
<h3>🏆 PRs</h3>
<br>
<p><strong>Maior carga:</strong> ${maxWeight} kg</p>
<p><strong>Maior reps:</strong> ${maxReps}</p>
<p><strong>1RM estimado:</strong> ${estimated1RM} kg</p>
<p><strong>Volume acumulado:</strong> ${Math.round(totalVolume)} kg</p>
`;
}

function updateGlobalStats(){

let totalWorkouts=history.length;
let totalSets=0;
let totalVolume=0;
let exercisesDone={};

history.forEach(log=>{

Object.entries(log.exercises)
.forEach(([exercise,sets])=>{

if(!exercisesDone[exercise]){
exercisesDone[exercise]=0;
}

exercisesDone[exercise]++;

totalSets+=sets.length;

sets.forEach(set=>{

totalVolume+=set.weight*set.reps;

});

});
});

let favoriteExercise='Nenhum';

if(Object.keys(exercisesDone).length>0){

favoriteExercise=
Object.keys(exercisesDone)
.reduce((a,b)=>
exercisesDone[a]>exercisesDone[b]
?a
:b
);
}

document.getElementById('global-stats').innerHTML=`
<h3>📊 Estatísticas Globais</h3>
<br>
<p><strong>Total de treinos:</strong> ${totalWorkouts}</p>
<p><strong>Total de séries:</strong> ${totalSets}</p>
<p><strong>Volume total:</strong> ${Math.round(totalVolume)} kg</p>
<p><strong>Exercício favorito:</strong> ${favoriteExercise}</p>
`;
}

function renderCalendar(){

const grid=document.getElementById('calendar-grid');
grid.innerHTML='';

const title=document.getElementById('calendar-title');

const year=currentCalendarDate.getFullYear();
const month=currentCalendarDate.getMonth();

const firstDay=new Date(year,month,1);
const lastDay=new Date(year,month+1,0);

const daysInMonth=lastDay.getDate();

let startDay=firstDay.getDay();
startDay=startDay===0?6:startDay-1;

const monthNames=[
'Janeiro','Fevereiro','Março','Abril','Maio','Junho',
'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'
];

title.innerText=`${monthNames[month]} ${year}`;

for(let i=0;i<startDay;i++){

grid.innerHTML+='<div class="day-box empty"></div>';
}

for(let day=1;day<=daysInMonth;day++){

const dateString=
`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

const trained=history.some(h=>h.date===dateString);

grid.innerHTML+=`
<div class="day-box ${trained?'trained':''}"
onclick="toggleTrainingDay('${dateString}')">
${day}
</div>
`;
}

updateWeeklyGoal();
updateMonthlyGoal();
}

function toggleTrainingDay(dateString){
    const existing = history.find(h => h.date === dateString);

    if(existing){
        // Se o dia tiver exercícios reais registados, pede confirmação
        if(existing.exercises && Object.keys(existing.exercises).length > 0) {
            const confirmDelete = confirm("⚠️ Este dia tem um treino gravado com séries reais. Tens a certeza que queres APAGAR todos os dados deste dia?");
            if(!confirmDelete) return; // Se cancelar, para por aqui
        }
        
        history = history.filter(h => h.date !== dateString);
    } else {
        history.push({
            date: dateString,
            day: 'MANUAL',
            exercises: {}
        });
    }

    localStorage.setItem('gym_history', JSON.stringify(history));
    renderCalendar();
    if(document.getElementById('view-evolucao').classList.contains('active')){
        updateGlobalStats();
    }
}

function updateWeeklyGoal(){

const now=new Date();
const sevenDaysAgo=new Date();
sevenDaysAgo.setDate(now.getDate()-7);

let weekly=0;

history.forEach(log=>{

const date=new Date(log.date);

if(date>=sevenDaysAgo&&date<=now){
weekly++;
}
});

document.getElementById('weekly-count').innerText=weekly;

document.getElementById('weekly-progress').style.width=
`${Math.min(weekly,6)/6*100}%`;
}

function updateMonthlyGoal(){

const year=currentCalendarDate.getFullYear();
const month=currentCalendarDate.getMonth();

let monthly=0;

history.forEach(log=>{

const date=new Date(log.date);

if(
date.getFullYear()===year&&
date.getMonth()===month
){
monthly++;
}
});

const goal=24;

document.getElementById('monthly-count').innerText=monthly;

document.getElementById('monthly-progress').style.width=
`${Math.min(monthly,goal)/goal*100}%`;
}

function changeMonth(direction){

currentCalendarDate.setMonth(
currentCalendarDate.getMonth()+direction
);

renderCalendar();
}

function shareWorkout(){

const text=`💪 Acabei o treino de ${currentDay}!`;

if(navigator.share){

navigator.share({
text
});

}else{

window.open(
`https://wa.me/?text=${encodeURIComponent(text)}`,
'_blank'
);
}
}

function showExerciseTips(exerciseName){

const tips={

'Supino Inclinado c/ Halteres':'Mantém o peito aberto e controla a descida.',
'Press Militar c/ Halteres':'Evita arquear demasiado a lombar.',
'Peso Morto Romeno (RDL)':'Empurra a anca para trás e mantém a coluna neutra.',
'Leg Press / Hack':'Empurra pelos calcanhares.',
'Curl Martelo':'Evita balanço corporal.'
};

document.getElementById('modal-title').innerText=exerciseName;

document.getElementById('modal-content').innerText=
tips[exerciseName]||'Sem dicas disponíveis.';

document.getElementById('exercise-modal').style.display='flex';
}

function closeModal(){

document.getElementById('exercise-modal').style.display='none';
}

function showExerciseVideo(exerciseName){

const videos={
'Supino Inclinado c/ Halteres':'https://www.youtube.com/results?search_query=supino+inclinado+halteres',
'Peso Morto Romeno (RDL)':'https://www.youtube.com/results?search_query=romanian+deadlift',
'Leg Press / Hack':'https://www.youtube.com/results?search_query=leg+press+tutorial'
};

const url=videos[exerciseName];

if(url){
window.open(url,'_blank');
}else{
alert('Vídeo ainda não disponível.');
}
}

renderWorkout();

</script>

</body>
</html>
