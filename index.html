<script>
const workoutData={
PUSH:[
{name:'Supino Inclinado c/ Halteres',sets:3},
{name:'Supino Plano na Máquina',sets:3},
{name:'Press Militar c/ Halteres',sets:3},
{name:'Elevações Laterais na Polia',sets:4},
{name:'Tríceps à Testa',sets:3},
{name:'Tríceps na Polia',sets:3}
],
PULL:[
{name:'Puxada Vertical na Polia Alta',sets:3},
{name:'Remada Sentada com Cabo',sets:3},
{name:'Remada Inclinada c/ Halteres',sets:3},
{name:'Voos Posteriores',sets:4},
{name:'Curl de Bíceps Inclinado',sets:3},
{name:'Curl Martelo',sets:3}
],
LEGS:[
{name:'Leg Press / Hack',sets:4},
{name:'Peso Morto Romeno (RDL)',sets:3},
{name:'Extensão de Pernas',sets:3},
{name:'Flexão de Pernas',sets:3},
{name:'Elevação de Gémeos em Pé',sets:4}
]
};

const exerciseDetails={
'Supino Inclinado c/ Halteres':{
explanation:'O supino inclinado com halteres trabalha principalmente a parte superior do peitoral. Mantém as escápulas retraídas, peito aberto e controla a descida.',
video:'https://www.youtube.com/shorts/Ks6H4mB6N9I'
},
'Supino Plano na Máquina':{
explanation:'Mantém o peito elevado e os ombros encaixados no banco. Evita bloquear os cotovelos no topo.',
video:'https://www.youtube.com/shorts/SCVCLChPQFY'
},
'Press Militar c/ Halteres':{
explanation:'Mantém o core contraído e evita arquear demasiado a lombar. Faz o movimento controlado.',
video:'https://www.youtube.com/shorts/qEwKCR5JCog'
},
'Peso Morto Romeno (RDL)':{
explanation:'Empurra a anca para trás mantendo a coluna neutra. Sente o alongamento nos posteriores.',
video:'https://www.youtube.com/shorts/0zKX0j7K3xg'
}
};

let currentDay='PUSH';
let history=JSON.parse(localStorage.getItem('gym_history'))||[];
let currentCalendarDate=new Date();
let chartInstance;
let timerInterval;

function switchMainView(event,id){
document.querySelectorAll('.view-section').forEach(v=>v.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.main-nav button').forEach(btn=>btn.classList.remove('active'));
event.target.classList.add('active');
if(id==='view-evolucao'){setupChartSelect();updateGlobalStats();}
if(id==='view-calendario'){renderCalendar();}
}

function switchWorkout(event,day){
currentDay=day;
document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active'));
event.target.classList.add('active');
renderWorkout();
}

function getLastPerformance(exerciseName){
for(let i=history.length-1;i>=0;i--){
if(history[i].exercises && history[i].exercises[exerciseName]) return history[i].exercises[exerciseName];
}
return null;
}

function renderWorkout(){
const container=document.getElementById('workout-container');
container.innerHTML='';

workoutData[currentDay].forEach((ex,exIdx)=>{
const lastPerf=getLastPerformance(ex.name);
const historyHTML=lastPerf ? `<div class="history-badge">Última vez: ${lastPerf[0].weight}kg x ${lastPerf[0].reps}</div>` : '';

let setsHTML='';

for(let s=1;s<=ex.sets;s++){
const pW=lastPerf&&lastPerf[s-1]?lastPerf[s-1].weight:'';
const pR=lastPerf&&lastPerf[s-1]?lastPerf[s-1].reps:'';

setsHTML+=`
<div class="set-row" id="row-${exIdx}-${s}">
<span>S${s}</span>
<div class="input-group">
<label>KG</label>
<input type="number" id="weight-${exIdx}-${s}" placeholder="${pW}">
</div>
<div class="input-group">
<label>REPS</label>
<input type="number" id="reps-${exIdx}-${s}" placeholder="${pR}">
</div>
<div class="input-group">
<label>RIR</label>
<select id="rir-${exIdx}-${s}">
<option value="0">0</option>
<option value="1" selected>1</option>
<option value="2">2</option>
<option value="3">3+</option>
</select>
</div>
<button class="check-btn" onclick="checkSet(${exIdx},${s})">✔</button>
</div>`;
}

container.innerHTML+=`
<div class="exercise-card">
<div class="exercise-name">${ex.name}</div>
${historyHTML}
<div class="exercise-buttons">
<button class="exercise-tip-btn" onclick="showExerciseTips('${ex.name}')">📘 Explicação</button>
<button class="exercise-video-btn" onclick="showExerciseVideo('${ex.name}')">🎥 Shorts</button>
</div>
${setsHTML}
</div>`;
});
}

function checkSet(exIdx,s){
document.getElementById(`row-${exIdx}-${s}`).classList.add('done');
startTimer(90);
}

function startTimer(seconds){
clearInterval(timerInterval);
const banner=document.getElementById('timer-banner');
const display=document.getElementById('timer-display');
banner.style.display='block';
let timeLeft=seconds;
display.innerText=timeLeft;

timerInterval=setInterval(()=>{
timeLeft--;
display.innerText=timeLeft;
if(timeLeft<=0){
clearInterval(timerInterval);
banner.style.display='none';
alert('Descanso terminado!');
}
},1000);
}

function saveCurrentWorkout(){
const dateObj=new Date();
const todayString=`${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;

const workoutLog={date:todayString,day:currentDay,exercises:{}};

const cards=document.querySelectorAll('.exercise-card');

cards.forEach((card,exIdx)=>{
const exName=workoutData[currentDay][exIdx].name;
const sets=[];

for(let s=1;s<=workoutData[currentDay][exIdx].sets;s++){
const weight=parseFloat(document.getElementById(`weight-${exIdx}-${s}`).value||document.getElementById(`weight-${exIdx}-${s}`).placeholder||0);
const reps=parseInt(document.getElementById(`reps-${exIdx}-${s}`).value||document.getElementById(`reps-${exIdx}-${s}`).placeholder||0);
const rir=parseInt(document.getElementById(`rir-${exIdx}-${s}`).value||0);
sets.push({weight,reps,rir});
}

workoutLog.exercises[exName]=sets;
});

history.push(workoutLog);
localStorage.setItem('gym_history',JSON.stringify(history));
alert('Treino gravado!');
}

function setupChartSelect(){
const select=document.getElementById('exercise-select');
select.innerHTML='<option value="">Escolhe um exercício...</option>';
const uniqueExercises=new Set();
history.forEach(log=>{
Object.keys(log.exercises||{}).forEach(ex=>uniqueExercises.add(ex));
});
uniqueExercises.forEach(ex=>{
select.innerHTML+=`<option value="${ex}">${ex}</option>`;
});
}

function renderChart(){
const exercise=document.getElementById('exercise-select').value;
if(!exercise)return;

const labels=[];
const data=[];
const reps=[];

history.forEach(log=>{
if(log.exercises && log.exercises[exercise]){
labels.push(log.date);
data.push(log.exercises[exercise][0].weight);
reps.push(log.exercises[exercise][0].reps);
}
});

if(chartInstance) chartInstance.destroy();

const ctx=document.getElementById('progressChart').getContext('2d');
chartInstance=new Chart(ctx,{
type:'line',
data:{
labels,
datasets:[{
label:'Carga (kg)',
data,
borderColor:'#38bdf8',
backgroundColor:'rgba(56,189,248,0.2)',
fill:true,
tension:0.3
}]
}
});

const maxWeight=Math.max(...data);
const maxReps=Math.max(...reps);
const estimated1RM=Math.round(maxWeight*(1+maxReps/30));

let totalVolume=0;

history.forEach(log=>{
if(log.exercises && log.exercises[exercise]){
log.exercises[exercise].forEach(set=>{
totalVolume+=set.weight*set.reps;
});
}
});

let coach='';
if(data.length>=3){
const last=data[data.length-1];
const previous=data[data.length-2];
coach=last>previous ? '📈 Excelente progressão recente.' : '⚠️ Sem progressão recente. Ajusta recuperação ou intensidade.';
}else{
coach='📊 Ainda há poucos dados para análise.';
}

document.getElementById('coach-message').innerText=coach;

document.getElementById('pr-display').innerHTML=`
<h3>🏆 PRs</h3>
<br>
<p><strong>Maior carga:</strong> ${maxWeight} kg</p>
<p><strong>Maior reps:</strong> ${maxReps}</p>
<p><strong>1RM estimado:</strong> ${estimated1RM} kg</p>
<p><strong>Volume acumulado:</strong> ${Math.round(totalVolume)} kg</p>`;
}

function updateGlobalStats(){
let totalWorkouts=history.length;
let totalSets=0;
let totalVolume=0;
let exercisesDone={};

history.forEach(log=>{
Object.entries(log.exercises||{}).forEach(([exercise,sets])=>{
if(!exercisesDone[exercise]) exercisesDone[exercise]=0;
exercisesDone[exercise]++;
totalSets+=sets.length;
sets.forEach(set=>{
totalVolume+=set.weight*set.reps;
});
});
});

let favoriteExercise='Nenhum';

if(Object.keys(exercisesDone).length>0){
favoriteExercise=Object.keys(exercisesDone).reduce((a,b)=>exercisesDone[a]>exercisesDone[b]?a:b);
}

document.getElementById('global-stats').innerHTML=`
<h3>📊 Estatísticas Globais</h3>
<br>
<p><strong>Total de treinos:</strong> ${totalWorkouts}</p>
<p><strong>Total de séries:</strong> ${totalSets}</p>
<p><strong>Volume total:</strong> ${Math.round(totalVolume)} kg</p>
<p><strong>Exercício favorito:</strong> ${favoriteExercise}</p>`;
}

function renderCalendar(){
const grid=document.getElementById('calendar-grid');
grid.innerHTML='';
const title=document.getElementById('calendar-title');

const year=currentCalendarDate.getFullYear();
const month=currentCalendarDate.getMonth();
const firstDay=new Date(year,month,1);
const lastDay=new Date(year,month+1,0);
const daysInMonth=lastDay.getDate();

let startDay=firstDay.getDay();
startDay=startDay===0?6:startDay-1;

const monthNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

title.innerText=`${monthNames[month]} ${year}`;

for(let i=0;i<startDay;i++){
grid.innerHTML+='<div class="day-box empty"></div>';
}

for(let day=1;day<=daysInMonth;day++){
const dateString=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
const trained=history.some(h=>h.date===dateString);

grid.innerHTML+=`<div class="day-box ${trained?'trained':''}" onclick="toggleTrainingDay('${dateString}')">${day}</div>`;
}

updateWeeklyGoal();
updateMonthlyGoal();
}

function toggleTrainingDay(dateString){
const existing=history.find(h=>h.date===dateString);

if(existing){
if(existing.exercises && Object.keys(existing.exercises).length>0){
const confirmDelete=confirm('⚠️ Este dia tem treino gravado. Queres apagar tudo?');
if(!confirmDelete) return;
}
history=history.filter(h=>h.date!==dateString);
}else{
history.push({date:dateString,day:'MANUAL',exercises:{}});
}

localStorage.setItem('gym_history',JSON.stringify(history));
renderCalendar();
}

function updateWeeklyGoal(){
const now=new Date();
const sevenDaysAgo=new Date();
sevenDaysAgo.setDate(now.getDate()-7);

let weekly=0;

history.forEach(log=>{
const date=new Date(log.date);
if(date>=sevenDaysAgo&&date<=now) weekly++;
});

document.getElementById('weekly-count').innerText=weekly;
document.getElementById('weekly-progress').style.width=`${Math.min(weekly,6)/6*100}%`;
}

function updateMonthlyGoal(){
const year=currentCalendarDate.getFullYear();
const month=currentCalendarDate.getMonth();
let monthly=0;

history.forEach(log=>{
const date=new Date(log.date);
if(date.getFullYear()===year && date.getMonth()===month) monthly++;
});

const goal=24;

document.getElementById('monthly-count').innerText=monthly;
document.getElementById('monthly-progress').style.width=`${Math.min(monthly,goal)/goal*100}%`;
}

function changeMonth(direction){
currentCalendarDate.setMonth(currentCalendarDate.getMonth()+direction);
renderCalendar();
}

function shareWorkout(){
const text=`💪 Acabei o treino de ${currentDay}!`;
if(navigator.share){
navigator.share({text});
}else{
